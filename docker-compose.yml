services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tasdeeq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tasdeeq}
      POSTGRES_DB: ${POSTGRES_DB:-tasdeeq}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tasdeeq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tasdeeq}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tasdeeq123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tasdeeq}:${POSTGRES_PASSWORD:-tasdeeq}@postgres:5432/${POSTGRES_DB:-tasdeeq}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web-admin:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - api

  web-corporate:
    build:
      context: .
      dockerfile: apps/web-corporate/Dockerfile
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - api

  web-employee:
    build:
      context: .
      dockerfile: apps/web-employee/Dockerfile
    restart: unless-stopped
    ports:
      - "3003:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
